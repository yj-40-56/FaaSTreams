

# COORDINATORS config (then passed to worker as raw SQL)
# this file. The coordinator still owns and sends the literal SQL text in
# each request's `query` field; 

# SQL schema:
#
#   object_id, lat, lon, ts, speed, heading, object_type, status
#  `ts`(TIME STAMP) needs to be ISO 8601. 

# 4 queries per return_type.

queries:

  # =====================================================================
  # TEMPORAL -- object_id, ts only
  # =====================================================================

  # Activity volume: how many times each object reported this window.
  - name: report_count_per_object
    return_type: temporal
    query: >
      SELECT object_id, COUNT(*) AS report_count
      FROM events
      GROUP BY object_id
      ORDER BY report_count DESC

  # How long each object was present in the window (first/last seen,
  # and the span between them). Needs TRY_CAST
  - name: presence_span_per_object
    return_type: temporal
    query: >
      WITH typed AS (SELECT object_id, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events)
      SELECT object_id, MIN(ts) AS first_seen, MAX(ts) AS last_seen,
             EXTRACT(EPOCH FROM (MAX(ts) - MIN(ts))) AS presence_seconds
      FROM typed
      GROUP BY object_id
      ORDER BY presence_seconds DESC

  # Reporting regularity per object: average and largest gap between
  # consecutive reports. Flags sparse/irregular reporters. Needs
  # TRY_CAST -- see caveat above.
  - name: reporting_gap_stats_per_object
    return_type: temporal
    query: >
      WITH typed AS (SELECT object_id, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events),
      gaps AS (
          SELECT object_id,
                 EXTRACT(EPOCH FROM (ts - LAG(ts) OVER (PARTITION BY object_id ORDER BY ts))) AS gap_seconds
          FROM typed
      )
      SELECT object_id, COUNT(gap_seconds) AS gap_count,
             ROUND(AVG(gap_seconds), 1) AS avg_gap_seconds, MAX(gap_seconds) AS max_gap_seconds
      FROM gaps
      WHERE gap_seconds IS NOT NULL
      GROUP BY object_id
      ORDER BY max_gap_seconds DESC

  # Activity trend across 10-second slices of the window -- shape of
  # activity over time, not just one window-wide total. Needs TRY_CAST
  # -- see caveat above.
  - name: activity_by_time_bucket
    return_type: temporal
    query: >
      WITH typed AS (SELECT object_id, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events)
      SELECT time_bucket(INTERVAL '10 seconds', ts) AS bucket,
             COUNT(DISTINCT object_id) AS active_objects, COUNT(*) AS report_count
      FROM typed
      GROUP BY bucket
      ORDER BY bucket

  # =====================================================================
  # SPATIAL -- object_id, lat, lon -- no time-ordering
  # =====================================================================

  # Bounding box of all activity this window -- lets a map client
  # auto-fit its viewport instead of using a fixed zoom.
  - name: window_bounding_extent
    return_type: spatial
    query: >
      SELECT MIN(lat) AS min_lat, MAX(lat) AS max_lat, MIN(lon) AS min_lon, MAX(lon) AS max_lon
      FROM events
      WHERE lat IS NOT NULL

  # Density heatmap: report count per coarse grid cell. 0.1 degree bins
  # (~11km) -- adjust ROUND precision to your actual spatial spread.
  - name: position_density_grid
    return_type: spatial
    query: >
      SELECT ROUND(lat, 1) AS lat_bin, ROUND(lon, 1) AS lon_bin, COUNT(*) AS report_count
      FROM events
      WHERE lat IS NOT NULL
      GROUP BY lat_bin, lon_bin
      ORDER BY report_count DESC

  # One representative position per object: its average lat/lon across
  # however many times it reported this window.
  - name: per_object_mean_position
    return_type: spatial
    query: >
      SELECT object_id, ROUND(AVG(lat), 5) AS mean_lat, ROUND(AVG(lon), 5) AS mean_lon,
             COUNT(*) AS report_count
      FROM events
      WHERE lat IS NOT NULL
      GROUP BY object_id
      ORDER BY object_id

  # Each object's single nearest other object this window, by haversine
  # distance on their most recent reported position (no spatial extension
  # needed). Symmetric: every object gets its own nearest-neighbor row.
  - name: nearest_object_pairs
    return_type: spatial
    query: >
      WITH latest_position AS (
          SELECT object_id, lat, lon,
                 ROW_NUMBER() OVER (PARTITION BY object_id ORDER BY ts DESC) AS rn
          FROM events
          WHERE lat IS NOT NULL
      ),
      distances AS (
          SELECT a.object_id, b.object_id AS nearest_object_id,
                 ROUND(6371000 * 2 * ASIN(SQRT(
                     POWER(SIN(RADIANS(b.lat - a.lat) / 2), 2) +
                     COS(RADIANS(a.lat)) * COS(RADIANS(b.lat)) * POWER(SIN(RADIANS(b.lon - a.lon) / 2), 2)
                 )), 1) AS distance_m
          FROM latest_position a
          JOIN latest_position b ON a.object_id != b.object_id AND a.rn = 1 AND b.rn = 1
      )
      SELECT object_id, nearest_object_id, distance_m
      FROM distances
      QUALIFY ROW_NUMBER() OVER (PARTITION BY object_id ORDER BY distance_m) = 1
      ORDER BY distance_m

  # =====================================================================
  # SPATIO-TEMPORAL -- object_id, lat, lon, ts together, ordered per object
  # =====================================================================

  # Raw ordered path per object across the window.
  - name: ordered_trajectory_points
    return_type: spatio_temporal
    query: >
      SELECT object_id, lat, lon, ts
      FROM events
      WHERE lat IS NOT NULL
      ORDER BY object_id, ts

  # Distance and time gap between each consecutive pair of reports per
  # object -- the building block for speed/anomaly queries when there's
  # no `speed` field to read directly. 
  - name: consecutive_step_distance
    return_type: spatio_temporal
    query: >
      WITH typed AS (SELECT object_id, lat, lon, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events WHERE lat IS NOT NULL),
      steps AS (
          SELECT object_id, ts, lat, lon,
                 LAG(lat) OVER w AS prev_lat, LAG(lon) OVER w AS prev_lon, LAG(ts) OVER w AS prev_ts
          FROM typed
          WINDOW w AS (PARTITION BY object_id ORDER BY ts)
      )
      SELECT object_id, prev_ts, ts, EXTRACT(EPOCH FROM (ts - prev_ts)) AS step_seconds,
             ROUND(6371000 * 2 * ASIN(SQRT(
                 POWER(SIN(RADIANS(lat - prev_lat) / 2), 2) +
                 COS(RADIANS(prev_lat)) * COS(RADIANS(lat)) * POWER(SIN(RADIANS(lon - prev_lon) / 2), 2)
             )), 1) AS step_distance_m
      FROM steps
      WHERE prev_ts IS NOT NULL
      ORDER BY object_id, ts

  # Total ground distance covered per object this window (sum of
  # consecutive-step distances). Needs TRY_CAST -- see caveat above.
  - name: total_distance_traveled
    return_type: spatio_temporal
    query: >
      WITH typed AS (SELECT object_id, lat, lon, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events WHERE lat IS NOT NULL),
      steps AS (
          SELECT object_id, lat, lon, LAG(lat) OVER w AS prev_lat, LAG(lon) OVER w AS prev_lon
          FROM typed
          WINDOW w AS (PARTITION BY object_id ORDER BY ts)
      ),
      step_distances AS (
          SELECT object_id, 6371000 * 2 * ASIN(SQRT(
                     POWER(SIN(RADIANS(lat - prev_lat) / 2), 2) +
                     COS(RADIANS(prev_lat)) * COS(RADIANS(lat)) * POWER(SIN(RADIANS(lon - prev_lon) / 2), 2)
                 )) AS step_distance_m
          FROM steps
          WHERE prev_lat IS NOT NULL
      )
      SELECT object_id, ROUND(SUM(step_distance_m), 1) AS total_distance_m, COUNT(*) AS num_steps
      FROM step_distances
      GROUP BY object_id
      ORDER BY total_distance_m DESC

  # Largest single jump per object, with implied speed -- a huge implied
  # speed over a short time gap is a likely GPS glitch rather than real
  # movement. 
  - name: largest_position_jump
    return_type: spatio_temporal
    query: >
      WITH typed AS (SELECT object_id, lat, lon, TRY_CAST(ts AS TIMESTAMP) AS ts FROM events WHERE lat IS NOT NULL),
      steps AS (
          SELECT object_id, ts, lat, lon,
                 LAG(lat) OVER w AS prev_lat, LAG(lon) OVER w AS prev_lon, LAG(ts) OVER w AS prev_ts
          FROM typed
          WINDOW w AS (PARTITION BY object_id ORDER BY ts)
      ),
      step_distances AS (
          SELECT object_id, prev_ts, ts, EXTRACT(EPOCH FROM (ts - prev_ts)) AS step_seconds,
                 6371000 * 2 * ASIN(SQRT(
                     POWER(SIN(RADIANS(lat - prev_lat) / 2), 2) +
                     COS(RADIANS(prev_lat)) * COS(RADIANS(lat)) * POWER(SIN(RADIANS(lon - prev_lon) / 2), 2)
                 )) AS step_distance_m
          FROM steps
          WHERE prev_lat IS NOT NULL
      )
      SELECT object_id, prev_ts AS jump_start, ts AS jump_end, step_seconds,
             ROUND(step_distance_m, 1) AS jump_distance_m,
             ROUND(step_distance_m / NULLIF(step_seconds, 0), 1) AS implied_speed_mps
      FROM step_distances
      QUALIFY ROW_NUMBER() OVER (PARTITION BY object_id ORDER BY step_distance_m DESC) = 1
      ORDER BY jump_distance_m DESC