# Canonical field mapping for the active MOD (moving object data) domain.

# normalize.py renames incoming record fields into the general names 
# SQL handles then: object_id, lat, lon, ts, speed, heading,
# object_type, status.

object_id: MMSI
lat: Latitude
lon: Longitude
ts: "# Timestamp"
speed: SOG
heading: heading
object_type: shipType
status: "Navigational status"

# other example:
# object_id: animalID
# lat: lg
# lon: bg
# ts: "time-stamp
# speed: SOG
# heading: heading
# object_type: animalSpecies
# status: "Health Status"