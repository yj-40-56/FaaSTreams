  - name: hazard_zones_proximity_alerts
    data_source: ais_data_v1
    window_type: tumbling
    window_size: 60
    query: "SELECT v.MMSI AS mmsi, v.Name AS name, v.SOG AS sog, v.NavigationalStatus AS navigationalStatus, v.Timestamp AS timestamp, z.zone_name, z.threshold_nm, ROUND(ST_Distance(ST_Transform(ST_Point(v.Longitude, v.Latitude), 'EPSG:4326', 'EPSG:3857'), ST_Transform(ST_GeomFromText(z.geom_wkt), 'EPSG:4326', 'EPSG:3857')) / 1852.0, 2) AS distance_nm FROM events v CROSS JOIN zones z WHERE v.Latitude IS NOT NULL AND ST_Distance(ST_Transform(ST_Point(v.Longitude, v.Latitude), 'EPSG:4326', 'EPSG:3857'), ST_Transform(ST_GeomFromText(z.geom_wkt), 'EPSG:4326', 'EPSG:3857')) / 1852.0 < z.threshold_nm ORDER BY distance_nm"
    return_type: spatial
    is_alert: true
    alert_format: "{mmsi} ({name}) — {distance_nm} nm from \"{zone_name}\" (threshold {threshold_nm} nm) | sog={sog} kn | status={navigationalStatus} | ts={timestamp}"

  - name: position_density_grid
    data_source: generic
    window_type: tumbling
    window_size: 60
    query: >
      SELECT ROUND({lat_field}, 1) AS lat_bin, ROUND({lon_field}, 1) AS lon_bin, COUNT(*) AS report_count
      FROM events
      WHERE {lat_field} IS NOT NULL
      GROUP BY lat_bin, lon_bin
      ORDER BY report_count DESC
    return_type: spatial
    is_alert: false
    alert_format: ""

  - name: report_count_per_object
    data_source: t-drive_data_v1
    window_type: tumbling
    window_size: 60
    return_type: temporal
    query: >
      SELECT taxi_id, COUNT(*) AS report_count
      FROM events
      GROUP BY taxi_id
      ORDER BY report_count DESC
    is_alert: false
    alert_format: ""
# logic behind return_types. Right now, we could be returning aggregates (summarizing multiple data points into one numerical output) or spatial (coordinates that can get plotted on a graph)
