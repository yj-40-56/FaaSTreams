sources:
  ais_data_v1:
    description: "AIS data source providing real-time vessel information including position, speed, and navigational status."
    csv_path: "../../data/ais.csv"
    csv_delimiter: ","
    scale_factor: 1.0
    id_field: "MMSI"
    timestamp_field: "# Timestamp"
    timestamp_format: "02/01/2006 15:04:05"
    lat_field: "Latitude"
    lon_field: "Longitude"
    columns:
      MMSI:               { from_field: "MMSI",                type: VARCHAR }
      Name:               { from_field: "Name",                type: VARCHAR }
      Latitude:           { from_field: "Latitude",            type: DOUBLE,  required: true }
      Longitude:          { from_field: "Longitude",           type: DOUBLE,  required: true }
      SOG:                { from_field: "SOG",                 type: DOUBLE }
      Timestamp:          { from_field: "# Timestamp",         type: VARCHAR }
      NavigationalStatus: { from_field: "Navigational status", type: VARCHAR }
      shipType:           { from_field: "shipType",            type: VARCHAR }
      typeOfMobile:       { from_field: "typeOfMobile",        type: VARCHAR }
      heading:            { from_field: "heading",             type: DOUBLE }
      destination:        { from_field: "destination",         type: VARCHAR }
    reference_tables:
      zones:
        columns:
          zone_name:    VARCHAR
          geom_wkt:     VARCHAR
          threshold_nm: DOUBLE
        rows:
          - zone_name:    "Subsea Pipeline Corridor Kattegat"
            geom_wkt:     "POLYGON((10.0 57.0, 10.5 57.0, 10.5 57.5, 10.0 57.5, 10.0 57.0))"
            threshold_nm: 2.0
          - zone_name:    "Offshore Wind Exclusion North Sea"
            geom_wkt:     "POLYGON((7.5 55.5, 8.0 55.5, 8.0 56.0, 7.5 56.0, 7.5 55.5))"
            threshold_nm: 2.0
          - zone_name:    "Restricted Zone Skagerrak"
            geom_wkt:     "POLYGON((10.5 58.0, 11.0 58.0, 11.0 58.5, 10.5 58.5, 10.5 58.0))"
            threshold_nm: 2.0
          - zone_name:    "Military Exercise Area Bornholm"
            geom_wkt:     "POLYGON((15.5 55.5, 16.0 55.5, 16.0 56.0, 15.5 56.0, 15.5 55.5))"
            threshold_nm: 3.0
  t-drive_data_v1:
    description: "T-Drive dataset containing GPS trajectories of taxis in Beijing."
    csv_path: "../../data/t-drive.csv"
    csv_delimiter: ","
    scale_factor: 10
    id_field: "taxi_id"
    timestamp_field: "timestamp"
    timestamp_format: "2006-01-02 15:04:05"
    lat_field: "latitude"
    lon_field: "longitude"
    columns:
      taxi_id:   { from_field: "taxi_id",   type: VARCHAR }
      latitude:  { from_field: "latitude",  type: DOUBLE, required: true }
      longitude: { from_field: "longitude", type: DOUBLE, required: true }
      timestamp: { from_field: "timestamp", type: VARCHAR }
    reference_tables: {}


