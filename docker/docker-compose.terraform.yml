# Terraform runner — no local installation required.
#
# Usage (Docker Compose v2):
#   docker compose -f docker/docker-compose.terraform.yml run --rm terraform init
#   docker compose -f docker/docker-compose.terraform.yml run --rm terraform validate
#   docker compose -f docker/docker-compose.terraform.yml run --rm terraform plan  -var-file="environments/baseline.tfvars"
#   docker compose -f docker/docker-compose.terraform.yml run --rm terraform apply -var-file="environments/baseline.tfvars"
#   docker compose -f docker/docker-compose.terraform.yml run --rm terraform destroy -var-file="environments/baseline.tfvars"
#
# Usage (plain Docker, if docker compose plugin is unavailable):
#   docker run --rm -v "$(pwd)/..:/workspace" -v "$HOME/.config/gcloud:/root/.config/gcloud:ro" \
#     -e GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json \
#     -w /workspace/terraform hashicorp/terraform:1.9 <command>
#
# GCP credentials:
#   The container mounts your local Application Default Credentials so it can
#   talk to GCP. Run `gcloud auth application-default login` on the host first.

services:
  terraform:
    image: hashicorp/terraform:1.9
    working_dir: /workspace/terraform
    volumes:
      # Mount project root so archive_file can read source files and write zips.
      - ..:/workspace
      # Application Default Credentials (set via `gcloud auth application-default login`)
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      # Prevent provider from writing to home dir cache in read-only mount
      TF_PLUGIN_CACHE_DIR: /tmp/tf-plugin-cache
