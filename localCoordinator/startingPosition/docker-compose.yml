services:
  redis:
    image: redis:alpine
    container_name: faastreams_redis
    ports:
      - "6379:6379"
    networks:
      - faastreams_net

  redis-insight:
    image: redis/redisinsight:latest
    container_name: faastreams_insight
    ports:
      - "8005:5540"
    networks:
      - faastreams_net
    depends_on:
      - redis

networks:
  faastreams_net:
    name: faastreams_net
    driver: bridge